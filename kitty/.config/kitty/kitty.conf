# vim:fileencoding=utf-8:foldmethod=marker

# Kitty theme
include ubuntu-theme.conf

# Typography
#font_family            Monaco
#font_size              16.0
#macos_font_size        16.0

# Disable audible bell
enable_audio_bell no

# Ghostty Styling: Background Opacity & Blur
background_opacity     0.85
background_blur        40

# Window Layout (Matching your exact Ghostty padding)
remember_window_size   no
initial_window_width   80c
initial_window_height  24c
hide_window_decorations no

# Compact & Balanced Padding (Top/Bottom: 4px, Left/Right: 6px)
window_padding_width   0 1.5

# Ghostty Cursor & Shell Integration Settings
cursor_shape           block
cursor_blink_interval  0
cursor_text_color      background
shell_integration      no-cursor

# Mouse Customizations
mouse_hide_while_typing yes
click_interval         0.5

# macOS Specific Configurations
macos_option_as_alt    both
macos_quit_on_last_window_close no
#macos_show_window_title_in window

# Scrollback Limits
scrollback_lines       80000

# Tab Bar Layout & Styling
tab_bar_edge           top
tab_bar_style          fade

# Tab Behavior & Minimal Visibility
tab_bar_min_tabs        2
#tab_activity_symbol     "- "
tab_activity_symbol     "• "
#tab_activity_symbol     "⚡ "
#tab_activity_symbol     "🔔 "

# Clipboard & Safety Settings
# Safe but seamless paste actions
paste_actions quote-urls-at-prompt,confirm-if-large

# Enable the flexible splitting layout
enabled_layouts splits, stack, horizontal

# Custom Keybinds
#map shift+ctrl+left_bracket  previous_tab
#map shift+ctrl+right_bracket next_tab

# forget shared ssh connections
map ctrl+shift+x close_shared_ssh_connections

# Split current window horizontally (side-by-side)
map ctrl+shift+h launch --location=hsplit

# Split current window vertically (top-and-bottom)
map ctrl+shift+v launch --location=vsplit

# Split window navigation
map ctrl+shift+left neighboring_window left
map ctrl+shift+right neighboring_window right
map ctrl+shift+up neighboring_window up
map ctrl+shift+down neighboring_window down

# Go to specific tabs
# note: cmd+# goes to specific window
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9

# Load local settings
#include kitty-local.conf

# Include a separate config file based on the OS
include ${KITTY_OS}.conf
