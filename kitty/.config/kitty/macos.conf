# macOS settings

# Theme, font and font size
include                ubuntu-theme.conf
font_family            Monaco
font_size              16.0

# Configure the window title bar appearance
#hide_window_decorations titlebar-only
#macos_titlebar_color background

# Common macOS clipboard mapping overrides
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard

# change font size for individual window
# Increase font size for the current OS window only
map cmd+equal            change_font_size current +2.0
map cmd+plus             change_font_size current +2.0
# Decrease font size for the current OS window only
map cmd+minus            change_font_size current -2.0
# Reset font size back to default for the current OS window only
map cmd+0                change_font_size current 0

# change font size for all windows
# Increase font size for the current OS window only
map cmd+shift+plus       change_font_size all +2.0
map cmd+shift+equal      change_font_size all +2.0
# Decrease font size for the current OS window only
map cmd+shift+minus      change_font_size all -2.0
# Reset font size back to default for the current OS window only
map cmd+shift+0          change_font_size all 0
